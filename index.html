<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AJIO Intel — Generating Excel...</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f1923;
            color: #e8edf2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1a2535;
            border: 1px solid #2a3a50;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .logo { font-size: 12px; font-weight: 700; letter-spacing: 3px; color: #4a9eff; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .sub { font-size: 13px; color: #6b7e96; margin-bottom: 32px; }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid #2a3a50;
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { font-size: 14px; color: #4a9eff; margin-bottom: 8px; font-weight: 600; }
        .detail { font-size: 12px; color: #6b7e96; }
        .done-icon { font-size: 48px; margin-bottom: 16px; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background: #22c55e;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        .error { color: #ef5a5a; font-size: 13px; margin-top: 16px; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">AJIO INTEL</div>

    <div id="loadingView">
        <div class="spinner"></div>
        <h1>Generating Excel</h1>
        <p class="sub">Building your report with all summary sheets...</p>
        <div class="status" id="statusText">Reading data...</div>
        <div class="detail" id="detailText"></div>
    </div>

    <div id="doneView" style="display:none">
        <div class="done-icon">✅</div>
        <h1>Excel Ready!</h1>
        <p class="sub" id="doneDetail">Your file has been downloaded.</p>
        <p class="detail" style="margin-top:12px;color:#4a5a6a;">You can close this tab.</p>
    </div>

    <div id="errorView" style="display:none">
        <div class="done-icon">❌</div>
        <h1>Something went wrong</h1>
        <p class="error" id="errorText"></p>
    </div>
</div>

<script>
// ── Helpers ───────────────────────────────────────────────────────────────────

function setStatus(msg, detail) {
    document.getElementById("statusText").textContent = msg;
    document.getElementById("detailText").textContent = detail || "";
}

function showDone(detail) {
    document.getElementById("loadingView").style.display = "none";
    document.getElementById("doneView").style.display    = "block";
    if (detail) document.getElementById("doneDetail").textContent = detail;
}

function showError(msg) {
    document.getElementById("loadingView").style.display = "none";
    document.getElementById("errorView").style.display   = "block";
    document.getElementById("errorText").textContent     = msg;
}

// ── Parse multi-section CSV ───────────────────────────────────────────────────

function parseSections(csvText) {
    const sections = {};
    let current    = null;
    let lines      = [];

    for (const line of csvText.split("\n")) {
        if (line.startsWith("=== ") && line.endsWith(" ===")) {
            if (current && lines.length) sections[current] = lines.join("\n");
            current = line.replace("=== ", "").replace(" ===", "").trim();
            lines   = [];
        } else if (line.trim()) {
            lines.push(line);
        }
    }
    if (current && lines.length) sections[current] = lines.join("\n");
    return sections;
}

function csvToArray(csv) {
    const rows = [];
    for (const line of csv.split("\n")) {
        if (!line.trim()) continue;
        // Simple CSV parse (handles quoted fields)
        const row = [];
        let inQuote = false, field = "";
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') {
                if (inQuote && line[i+1] === '"') { field += '"'; i++; }
                else inQuote = !inQuote;
            } else if (ch === "," && !inQuote) {
                row.push(field); field = "";
            } else {
                field += ch;
            }
        }
        row.push(field);
        rows.push(row);
    }
    return rows;
}

// ── Excel styling ─────────────────────────────────────────────────────────────

const HEADER_STYLE = {
    font:      { bold: true, color: { rgb: "FFFFFF" }, name: "Arial", sz: 10 },
    fill:      { fgColor: { rgb: "1F3864" }, patternType: "solid" },
    alignment: { horizontal: "center", vertical: "center" },
    border: {
        top:    { style: "thin", color: { rgb: "D0D7E3" } },
        bottom: { style: "thin", color: { rgb: "D0D7E3" } },
        left:   { style: "thin", color: { rgb: "D0D7E3" } },
        right:  { style: "thin", color: { rgb: "D0D7E3" } },
    }
};

const ALT_STYLE = {
    font:  { name: "Arial", sz: 10 },
    fill:  { fgColor: { rgb: "EEF2F7" }, patternType: "solid" },
    border: HEADER_STYLE.border,
};

const BODY_STYLE = {
    font:  { name: "Arial", sz: 10 },
    border: HEADER_STYLE.border,
};

function styleCell(cell, style) {
    cell.s = style;
}

function buildSheet(wb, sheetName, rows, pctCols, currencyCols, colWidths) {
    if (!rows || rows.length < 2) return;

    const ws      = {};
    const headers = rows[0];
    const range   = { s: { c:0, r:0 }, e: { c: headers.length-1, r: rows.length-1 } };

    rows.forEach((row, r) => {
        row.forEach((val, c) => {
            const addr = XLSX.utils.encode_cell({ r, c });
            let v = val;
            let t = "s";
            let z = undefined;

            // Convert numbers
            if (r > 0) {
                const num = parseFloat(String(val).replace(/[₹,%]/g, "").replace(/,/g,"").trim());
                if (!isNaN(num) && val !== "" && val !== null && val !== undefined) {
                    // Percentage columns
                    if (pctCols && pctCols.includes(headers[c])) {
                        v = num > 1 ? num / 100 : num;
                        t = "n";
                        z = "0.0%";
                    }
                    // Currency columns
                    else if (currencyCols && currencyCols.includes(headers[c])) {
                        v = num;
                        t = "n";
                        z = '₹#,##0';
                    }
                    // Plain number
                    else if (
                        String(val).trim() !== "" &&
                        !String(val).includes("-") &&
                        !String(val).includes("https")
                    ) {
                        v = num;
                        t = "n";
                    }
                }
            }

            const cell = { v, t };
            if (z) cell.z = z;
            if (r === 0) {
                cell.s = HEADER_STYLE;
            } else {
                cell.s = r % 2 === 0 ? ALT_STYLE : BODY_STYLE;
            }
            ws[addr] = cell;
        });
    });

    ws["!ref"] = XLSX.utils.encode_range(range);

    // Column widths
    if (colWidths) {
        ws["!cols"] = headers.map(h => ({ wch: colWidths[h] || 15 }));
    } else {
        ws["!cols"] = headers.map(() => ({ wch: 18 }));
    }

    XLSX.utils.book_append_sheet(wb, ws, sheetName);
}

// ── Main ──────────────────────────────────────────────────────────────────────

async function generateExcel(csvData, brandName) {
    setStatus("Parsing data...", "Reading all sections");

    const sections = parseSections(csvData);
    const keys     = Object.keys(sections);

    if (!keys.length) throw new Error("No data sections found in CSV");

    setStatus("Building Excel...", `Found ${keys.length} sheets`);

    const wb = XLSX.utils.book_new();

    // Raw Data
    if (sections["Raw Data"]) {
        const rows = csvToArray(sections["Raw Data"]);
        buildSheet(wb, "Raw Data", rows,
            ["Discount % (Scraped)", "Discount % (Calc)", "1-(Selling Price/MRP)"],
            ["Selling Price", "MRP"],
            {
                "Product ID": 22, "Scraped Date": 20, "Search Rank": 12,
                "Brand": 20, "Product Name": 40, "Tag": 12, "Sold Out": 10,
                "Product Category": 25, "Price Band": 12,
                "Selling Price": 14, "MRP": 12,
                "1-(Selling Price/MRP)": 22,
                "Discount % (Scraped)": 20, "Discount % (Calc)": 18,
                "Rating": 10, "No. of Reviews": 15, "Product URL": 50,
            }
        );
        setStatus("Building Excel...", "Raw Data ✓");
    }

    // Brand Summary
    if (sections["Brand Summary"]) {
        const rows = csvToArray(sections["Brand Summary"]);
        buildSheet(wb, "Brand Summary", rows,
            ["Avg_Discount_Pct"],
            ["Avg_Selling_Price", "Avg_MRP"]
        );
        setStatus("Building Excel...", "Brand Summary ✓");
    }

    // Tag Summary
    if (sections["Tag Summary"]) {
        const rows = csvToArray(sections["Tag Summary"]);
        buildSheet(wb, "Tag Summary", rows,
            ["Avg_Discount_Pct", "SKU Share %"],
            ["Avg_Selling_Price", "Avg_MRP"]
        );
        setStatus("Building Excel...", "Tag Summary ✓");
    }

    // Price Band
    if (sections["Price Band"]) {
        const rows = csvToArray(sections["Price Band"]);
        buildSheet(wb, "Price Band", rows,
            ["Avg_Discount", "SKU Share %"],
            ["Avg_Price"]
        );
        setStatus("Building Excel...", "Price Band ✓");
    }

    // Search Summary
    if (sections["Search Summary"]) {
        const rows = csvToArray(sections["Search Summary"]);
        buildSheet(wb, "Search Summary", rows,
            ["Avg Discount % (Calc)"],
            ["Avg Selling Price", "Avg MRP"]
        );
        setStatus("Building Excel...", "Search Summary ✓");
    }

    setStatus("Downloading...", "Saving Excel file");

    // Generate filename
    const now     = new Date();
    const pad     = n => String(n).padStart(2,"0");
    const dateStr = `${pad(now.getDate())}-${pad(now.getMonth()+1)}-${now.getFullYear()}_${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}`;
    const safe    = (brandName || "Brand").replace(/[^a-zA-Z0-9]/g,"_");
    const fname   = `Ajio_${safe}_${dateStr}.xlsx`;

    XLSX.writeFile(wb, fname, { bookSST: false, type: "binary", cellStyles: true });

    return fname;
}

// ── Entry point ───────────────────────────────────────────────────────────────

window.addEventListener("load", async () => {
    try {
        // Get data from URL hash or localStorage
        const hash = window.location.hash.slice(1);
        let csvData   = null;
        let brandName = "Brand";

        if (hash) {
            // Data passed via URL hash (base64 encoded)
            setStatus("Reading data from extension...");
            const decoded = decodeURIComponent(atob(hash));
            const parsed  = JSON.parse(decoded);
            csvData   = parsed.csv;
            brandName = parsed.brand || "Brand";
        } else {
            // Fallback: try localStorage
            csvData   = localStorage.getItem("ajio_intel_csv");
            brandName = localStorage.getItem("ajio_intel_brand") || "Brand";
            localStorage.removeItem("ajio_intel_csv");
            localStorage.removeItem("ajio_intel_brand");
        }

        if (!csvData) {
            showError("No data received. Please try downloading again from the extension.");
            return;
        }

        setStatus("Generating Excel file...", `Brand: ${brandName}`);
        await new Promise(r => setTimeout(r, 100)); // let UI update

        const fname = await generateExcel(csvData, brandName);
        showDone(`${fname} downloaded successfully.`);

    } catch (err) {
        console.error(err);
        showError(err.message || "Unknown error occurred.");
    }
});
</script>
</body>
</html>
